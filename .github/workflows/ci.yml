name: Github CI

on:
  push:
    branches:
      - main
      - ci
  pull_request:

jobs:
  test:
    name: test functions
    runs-on: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
